<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャワー予約システム｜清稜クリニック</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f1;
    --warm-white: #fff9f4;
    --sage: #8aab8a;
    --sage-light: #b5cdb5;
    --sage-dark: #5d7d5d;
    --blush: #e8c5b8;
    --blush-light: #f5e4dd;
    --brown: #7a5c4a;
    --text-dark: #3a2e28;
    --text-mid: #6b5448;
    --text-light: #9a7c6e;
    --gold: #c4986a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: white;
    border-bottom: 1px solid rgba(138,171,138,0.2);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(90,70,56,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    color: var(--text-dark);
    font-weight: 500;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-light);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }
  .divider-v { width: 1px; height: 28px; background: rgba(138,171,138,0.3); }
  .header-title { font-size: 15px; font-weight: 500; color: var(--text-mid); }

  .patient-badge {
    background: var(--blush-light);
    color: var(--brown);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .patient-badge:hover { border-color: var(--blush); background: #f0d8d0; }

  .patient-badge-empty {
    background: rgba(138,171,138,0.12);
    color: var(--sage-dark);
    border: 1px dashed rgba(138,171,138,0.5);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .patient-badge-empty:hover { background: rgba(138,171,138,0.2); }

  /* ===== LAYOUT ===== */
  .container { max-width: 760px; margin: 0 auto; padding: 32px 20px 110px; }

  /* ===== DATE NAV ===== */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
    background: white;
    border-radius: 16px;
    padding: 16px 24px;
    box-shadow: 0 2px 12px rgba(90,70,56,0.05);
  }
  .date-btn {
    background: none;
    border: 1px solid rgba(138,171,138,0.3);
    color: var(--text-mid);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .date-btn:hover { background: var(--sage-light); color: white; border-color: var(--sage-light); }
  .date-display { text-align: center; min-width: 210px; }
  .date-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-dark);
  }
  .date-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; letter-spacing: 0.05em; }
  .date-dots { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .date-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(138,171,138,0.25);
    cursor: pointer;
    transition: background 0.2s;
  }
  .date-dot.active { background: var(--sage); }

  /* ===== LEGEND ===== */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-light); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* ===== ROOM GRID ===== */
  .rooms-header {
    display: grid;
    grid-template-columns: 80px repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 8px;
  }
  .room-label {
    background: white;
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(90,70,56,0.05);
  }
  .room-label-icon { font-size: 22px; margin-bottom: 4px; }
  .room-label-name { font-size: 13px; font-weight: 500; color: var(--text-dark); }
  .room-label-status {
    font-size: 10px;
    margin-top: 5px;
    padding: 2px 8px;
    border-radius: 50px;
    display: inline-block;
  }
  .status-open { background: rgba(138,171,138,0.15); color: var(--sage-dark); }
  .status-unavailable { background: rgba(58,46,40,0.12); color: var(--text-mid); }

  /* ===== TIME GRID ===== */
  .time-grid { display: flex; flex-direction: column; gap: 6px; }
  .time-row {
    display: grid;
    grid-template-columns: 80px repeat(2, 1fr);
    gap: 10px;
    align-items: center;
  }
  .time-label {
    font-size: 12px;
    color: var(--text-light);
    text-align: right;
    padding-right: 12px;
    font-weight: 300;
  }

  /* ===== SLOTS ===== */
  .slot {
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    border: 2px solid transparent;
    position: relative;
    min-height: 58px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .slot-available { background: rgba(138,171,138,0.12); border-color: rgba(138,171,138,0.2); }
  .slot-available:hover { background: rgba(138,171,138,0.25); border-color: var(--sage); transform: scale(1.02); }
  .slot-taken { background: rgba(232,197,184,0.25); border-color: rgba(232,197,184,0.3); cursor: not-allowed; opacity: 0.7; }
  .slot-unavailable { background: rgba(58,46,40,0.08); border-color: rgba(58,46,40,0.15); color: var(--text-mid); cursor: not-allowed; opacity: 0.85; }
  .slot-mine { background: rgba(196,152,106,0.15); border-color: var(--gold); cursor: pointer; }
  .slot-mine:hover { background: rgba(196,152,106,0.25); }
  .slot-selected {
    background: var(--sage-dark);
    border-color: var(--sage-dark);
    transform: scale(1.02);
    box-shadow: 0 4px 16px rgba(93,125,93,0.3);
  }

  .slot-time { font-size: 13px; font-weight: 500; }
  .slot-available .slot-time { color: var(--sage-dark); }
  .slot-taken    .slot-time { color: var(--text-light); }
  .slot-unavailable .slot-time { color: var(--text-mid); }
  .slot-mine     .slot-time { color: var(--brown); }
  .slot-selected .slot-time { color: white; }

  .slot-name { font-size: 10px; margin-top: 3px; font-weight: 300; }
  .slot-available .slot-name { color: var(--sage); }
  .slot-taken    .slot-name { color: var(--text-light); }
  .slot-unavailable .slot-name { color: var(--text-mid); }
  .slot-mine     .slot-name { color: var(--gold); font-weight: 500; }
  .slot-selected .slot-name { color: rgba(255,255,255,0.8); }

  .slot-badge {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold);
    color: white;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== BOOKING PANEL ===== */
  .booking-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid rgba(138,171,138,0.2);
    padding: 18px 24px;
    box-shadow: 0 -4px 24px rgba(90,70,56,0.1);
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 40;
  }
  .booking-panel.show { transform: translateY(0); }
  .panel-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .panel-info { flex: 1; min-width: 180px; }
  .panel-label { font-size: 11px; color: var(--text-light); letter-spacing: 0.1em; margin-bottom: 4px; }
  .panel-detail {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-dark);
  }
  .panel-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .panel-note {
    background: var(--blush-light);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--brown);
    line-height: 1.7;
    flex: 1;
    min-width: 180px;
  }

  .btn-book {
    background: var(--sage-dark);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(93,125,93,0.3);
    white-space: nowrap;
  }
  .btn-book:hover { background: var(--sage); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(93,125,93,0.4); }
  .btn-book:disabled { background: var(--sage-light); cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.6; }

  .btn-deselect {
    background: none;
    border: 1px solid rgba(138,171,138,0.4);
    color: var(--text-light);
    padding: 14px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-deselect:hover { border-color: var(--text-light); color: var(--text-mid); }

  /* ===== MODALS ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(58,46,40,0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 24px;
    padding: 40px;
    max-width: 420px;
    width: calc(100% - 40px);
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(58,46,40,0.2);
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal-icon { font-size: 48px; margin-bottom: 16px; }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 10px;
  }
  .modal-body { font-size: 14px; color: var(--text-mid); line-height: 1.9; margin-bottom: 18px; }

  .modal-detail {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    text-align: left;
  }
  .modal-detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(138,171,138,0.1);
  }
  .modal-detail-row:last-child { border-bottom: none; }
  .modal-detail-key { color: var(--text-light); }
  .modal-detail-val { color: var(--text-dark); font-weight: 500; }

  .modal-btns { display: flex; gap: 12px; justify-content: center; }

  .modal-btn-confirm {
    background: var(--sage-dark);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .modal-btn-confirm:hover { background: var(--sage); }

  .modal-btn-danger {
    background: #b94040;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn-danger:hover { background: #963030; }

  .modal-btn-back {
    background: none;
    border: 1px solid rgba(138,171,138,0.4);
    color: var(--text-light);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn-back:hover { border-color: var(--text-light); color: var(--text-mid); }

  /* ===== SETUP FORM ===== */
  .form-group { text-align: left; margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 6px; letter-spacing: 0.05em; }
  .form-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(138,171,138,0.3);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-dark);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--sage); background: white; }
  .form-input::placeholder { color: var(--text-light); }
  .form-input.error { border-color: #b94040; }

  /* ===== MY BOOKINGS ===== */
  .my-bookings {
    margin-top: 32px;
    background: white;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(90,70,56,0.05);
  }
  .my-bookings-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .booking-empty { text-align: center; color: var(--text-light); font-size: 13px; padding: 24px 0; font-style: italic; }

  .booking-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--cream);
  }
  .booking-item:last-child { border-bottom: none; }
  .booking-color { width: 4px; height: 44px; border-radius: 2px; background: var(--gold); flex-shrink: 0; }
  .booking-info { flex: 1; }
  .booking-time { font-weight: 500; font-size: 14px; color: var(--text-dark); }
  .booking-meta { font-size: 12px; color: var(--text-light); margin-top: 3px; }

  .btn-cancel-booking {
    background: none;
    border: 1px solid rgba(232,197,184,0.5);
    color: var(--text-light);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel-booking:hover { border-color: var(--blush); color: var(--brown); background: var(--blush-light); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--sage-dark);
    color: white;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(93,125,93,0.4);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--brown); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 520px) {
    .header { padding: 12px 14px; }
    .header-sub, .divider-v { display: none; }
    .container { padding: 18px 10px 110px; }
    .rooms-header, .time-row { grid-template-columns: 58px repeat(2, 1fr); gap: 6px; }
    .time-label { font-size: 10px; padding-right: 6px; }
    .slot { min-height: 50px; padding: 8px 6px; }
    .slot-time { font-size: 11px; }
    .panel-note { display: none; }
    .btn-book { padding: 12px 20px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">清稜クリニック</div>
      <div class="header-sub">Seiryo Clinic</div>
    </div>
    <div class="divider-v"></div>
    <div class="header-title">🚿 シャワー予約</div>
  </div>
  <div id="patientBadge" onclick="openSetupModal(true)"></div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- DATE NAV -->
  <div class="date-nav">
    <button class="date-btn" onclick="changeDay(-1)">‹</button>
    <div class="date-display">
      <div class="date-main" id="dateMain"></div>
      <div class="date-sub"  id="dateSub"></div>
      <div class="date-dots" id="dateDots"></div>
    </div>
    <button class="date-btn" onclick="changeDay(1)">›</button>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(138,171,138,0.3);border:1px solid rgba(138,171,138,0.4);"></div>空き
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(232,197,184,0.4);"></div>予約済み
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(196,152,106,0.25);border:1px solid var(--gold);"></div>あなたの予約
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(58,46,40,0.15);"></div>使用不可
    </div>
  </div>

  <!-- ROOM HEADERS -->
  <div class="rooms-header">
    <div></div>
    <div class="room-label">
      <div class="room-label-icon">🚿</div>
      <div class="room-label-name">シャワー室 A</div>
      <div class="room-label-status status-open" id="statusA">空き</div>
    </div>
    <div class="room-label">
      <div class="room-label-icon">🚿</div>
      <div class="room-label-name">シャワー室 B</div>
      <div class="room-label-status status-open" id="statusB">空き</div>
    </div>
  </div>

  <!-- TIME GRID -->
  <div class="time-grid" id="timeGrid"></div>

  <!-- MY BOOKINGS -->
  <div class="my-bookings">
    <div class="my-bookings-title">📋 あなたの予約一覧</div>
    <div id="myBookingsList">
      <div class="booking-empty">現在、予約はありません</div>
    </div>
  </div>

</div>

<!-- BOTTOM BOOKING PANEL -->
<div class="booking-panel" id="bookingPanel">
  <div class="panel-inner">
    <div class="panel-info">
      <div class="panel-label">選択中の枠</div>
      <div class="panel-detail" id="panelDetail">—</div>
      <div class="panel-sub"    id="panelSub">45分間</div>
    </div>
    <div class="panel-note">
      ご利用後は換気扇を止めず、<br>備品を元の場所にお戻しください🌿
    </div>
    <button class="btn-deselect" onclick="clearSelection()">選択解除</button>
    <button class="btn-book" id="btnBook" onclick="openConfirmModal()">この時間を予約する</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-icon">🚿</div>
    <div class="modal-title">予約の確認</div>
    <div class="modal-body">以下の内容で予約します。<br>よろしいですか？</div>
    <div class="modal-detail" id="confirmDetail"></div>
    <div class="modal-btns">
      <button class="modal-btn-back"    onclick="closeConfirmModal()">戻る</button>
      <button class="modal-btn-confirm" onclick="doBook()">予約する</button>
    </div>
  </div>
</div>

<!-- CANCEL MODAL -->
<div class="modal-overlay" id="cancelOverlay">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">予約のキャンセル</div>
    <div class="modal-body">この予約をキャンセルしますか？<br>操作は取り消せません。</div>
    <div class="modal-detail" id="cancelDetail"></div>
    <div class="modal-btns">
      <button class="modal-btn-back"   onclick="closeCancelModal()">戻る</button>
      <button class="modal-btn-danger" onclick="doCancel()">キャンセルする</button>
    </div>
  </div>
</div>

<!-- PATIENT SETUP MODAL -->
<div class="modal-overlay" id="setupOverlay">
  <div class="modal">
    <div class="modal-icon">👤</div>
    <div class="modal-title"  id="setupTitle">患者情報の設定</div>
    <div class="modal-body"   id="setupBody">お名前と患者IDを入力してください。</div>
    <div class="form-group">
      <label class="form-label">お名前 <span style="color:#b94040;">*</span></label>
      <input class="form-input" type="text" id="inputName" placeholder="例：山田 花子" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">患者ID・部屋番号</label>
      <input class="form-input" type="text" id="inputId" placeholder="例：203号室 / P-1234" maxlength="20">
    </div>
    <div class="modal-btns">
      <button class="modal-btn-back"    id="setupCancelBtn" onclick="closeSetupModal()" style="display:none;">キャンセル</button>
      <button class="modal-btn-confirm" onclick="savePatient()">設定する</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==============================
// CONFIG
// ==============================
const ROOMS = ['A', 'B'];
const VALID_SLOTS = [
  { start: '8:30',  end: '9:15'  },
  { start: '9:15',  end: '10:00' },
  { start: '10:00', end: '10:45' },
  { start: '10:45', end: '11:30' },
  { start: '11:30', end: '12:15' },
  { start: '12:15', end: '13:00' },
  { start: '13:00', end: '13:45' },
];

// ==============================
// STATE
// ==============================
let currentDayOffset = 0;
let selected    = null; // { day, slot, room, key }
let cancelKey   = null; // key to cancel
let bookings    = {};   // key: "day_start_room" -> { patientName, patientId, mine }
let roomUnavailable = {}; // dayOffset -> 'A'|'B' (その日使用しない室)
let patientName = '';
let patientId   = '';

// ==============================
// INIT
// ==============================
function init() {
  try { bookings = JSON.parse(localStorage.getItem('scBookings') || '{}'); } catch(e) { bookings = {}; }
  try { roomUnavailable = JSON.parse(localStorage.getItem('scRoomUnavailable') || '{}'); } catch(e) { roomUnavailable = {}; }
  patientName = localStorage.getItem('scPatientName') || '';
  patientId   = localStorage.getItem('scPatientId')   || '';

  if (!patientName) {
    openSetupModal(false); // first-time, no cancel
  }
  renderBadge();
  renderAll();
}

function persist() {
  localStorage.setItem('scBookings', JSON.stringify(bookings));
}

// 自分の予約か（自分で予約した or スタッフが同じ名前・IDで代理予約した）
function isMyBooking(b) {
  if (!b || b.blocked) return false;
  if (b.mine) return true;
  if (!patientName) return false;
  if ((b.patientName || '').trim() !== (patientName || '').trim()) return false;
  return (b.patientId || '').trim() === (patientId || '').trim();
}

// ==============================
// PATIENT BADGE
// ==============================
function renderBadge() {
  const el = document.getElementById('patientBadge');
  if (patientName) {
    el.className = 'patient-badge';
    el.innerHTML = `👤 ${patientName}（${patientId || 'ID未設定'}）<span style="font-size:9px;opacity:.55;margin-left:2px;">✎</span>`;
  } else {
    el.className = 'patient-badge-empty';
    el.innerHTML = `＋ 患者情報を設定`;
  }
}

// ==============================
// SETUP MODAL
// ==============================
function openSetupModal(canCancel) {
  document.getElementById('inputName').value = patientName;
  document.getElementById('inputId').value   = patientId;
  document.getElementById('inputName').classList.remove('error');

  if (canCancel) {
    document.getElementById('setupCancelBtn').style.display = 'inline-block';
    document.getElementById('setupTitle').textContent = '患者情報の変更';
    document.getElementById('setupBody').textContent  = 'お名前と患者IDを変更できます。';
  } else {
    document.getElementById('setupCancelBtn').style.display = 'none';
    document.getElementById('setupTitle').textContent = '患者情報の設定';
    document.getElementById('setupBody').textContent  = 'はじめに、お名前と患者IDを入力してください。';
  }
  document.getElementById('setupOverlay').classList.add('show');
  setTimeout(() => document.getElementById('inputName').focus(), 300);
}

function closeSetupModal() {
  document.getElementById('setupOverlay').classList.remove('show');
}

function savePatient() {
  const name = document.getElementById('inputName').value.trim();
  const id   = document.getElementById('inputId').value.trim();
  if (!name) {
    document.getElementById('inputName').classList.add('error');
    document.getElementById('inputName').focus();
    return;
  }
  patientName = name;
  patientId   = id;
  localStorage.setItem('scPatientName', patientName);
  localStorage.setItem('scPatientId',   patientId);
  closeSetupModal();
  renderBadge();
  showToast('✓ 患者情報を設定しました');
  renderGrid(); // refresh button state
}

// ==============================
// DATE NAV
// ==============================
const WEEK_DAYS = ['日', '月', '火', '水', '木', '金', '土'];

function getDateObj(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d;
}

function fmtDate(d) {
  return `${d.getMonth()+1}月${d.getDate()}日（${WEEK_DAYS[d.getDay()]}）`;
}

function renderDateNav() {
  const d = getDateObj(currentDayOffset);
  document.getElementById('dateMain').textContent = fmtDate(d);
  const lbl = ['今日','明日','明後日'][currentDayOffset] || `${currentDayOffset}日後`;
  document.getElementById('dateSub').textContent = lbl;

  const dots = document.getElementById('dateDots');
  dots.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const dot = document.createElement('div');
    dot.className = 'date-dot' + (i === currentDayOffset ? ' active' : '');
    const di = i;
    dot.onclick = () => { currentDayOffset = di; clearSelection(); renderAll(); };

    // Tooltip: show date
    const dd = getDateObj(i);
    dot.title = `${dd.getMonth()+1}/${dd.getDate()}（${WEEK_DAYS[dd.getDay()]}）`;
    dots.appendChild(dot);
  }
}

function changeDay(dir) {
  currentDayOffset = Math.max(0, Math.min(6, currentDayOffset + dir));
  clearSelection();
  renderAll();
}

// ==============================
// GRID
// ==============================
function renderGrid() {
  try { roomUnavailable = JSON.parse(localStorage.getItem('scRoomUnavailable') || '{}'); } catch(e) { roomUnavailable = {}; }
  const grid = document.getElementById('timeGrid');
  grid.innerHTML = '';

  let lastPeriod = null;

  VALID_SLOTS.forEach(({ start, end }) => {
    const h = parseInt(start.split(':')[0]);
    const period = h < 12 ? 'morning' : 'afternoon';

    // Section separator
    if (period !== lastPeriod) {
      lastPeriod = period;
      const label = period === 'morning' ? '午前 8:30 — 12:00' : '午後 12:00 — 14:00';
      const sepRow = document.createElement('div');
      sepRow.className = 'time-row';
      sepRow.style.cssText = 'margin: 10px 0 4px;';
      sepRow.innerHTML = `<div style="grid-column:1/-1;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;height:1px;background:rgba(138,171,138,0.15);"></div>
        <span style="font-size:11px;color:var(--text-light);letter-spacing:.1em;font-family:'Cormorant Garamond',serif;font-style:italic;white-space:nowrap;">${label}</span>
        <div style="flex:1;height:1px;background:rgba(138,171,138,0.15);"></div>
      </div>`;
      grid.appendChild(sepRow);
    }

    const row = document.createElement('div');
    row.className = 'time-row';

    // Time label
    const tl = document.createElement('div');
    tl.className = 'time-label';
    tl.textContent = start;
    row.appendChild(tl);

    // Slots per room
    ROOMS.forEach(room => {
      const key     = `${currentDayOffset}_${start}_${room}`;
      const booking = bookings[key];
      const roomOff = roomUnavailable[String(currentDayOffset)] === room;
      const slotBlocked = booking && booking.blocked;
      const isUnavailable = roomOff || slotBlocked;
      const isSelected = selected && selected.key === key;
      const isMine     = isMyBooking(booking);
      const isTaken    = booking && !booking.blocked && !isMyBooking(booking);

      const el = document.createElement('div');
      el.className = 'slot ' + (
        isUnavailable ? 'slot-unavailable' :
        isSelected    ? 'slot-selected'   :
        isMine       ? 'slot-mine'        :
        isTaken      ? 'slot-taken'       :
                       'slot-available'
      );

      const tSpan = document.createElement('div');
      tSpan.className = 'slot-time';
      tSpan.textContent = (isTaken || isMine || isSelected) ? `${start}〜${end}` : start;

      const nSpan = document.createElement('div');
      nSpan.className = 'slot-name';
      nSpan.textContent = isUnavailable ? '使用不可' : isSelected ? '選択中' : isMine ? 'あなたの予約' : isTaken ? '予約済み' : '空き';

      el.appendChild(tSpan);
      el.appendChild(nSpan);

      if (isMine) {
        const badge = document.createElement('div');
        badge.className = 'slot-badge';
        badge.textContent = '✓';
        el.appendChild(badge);
      }

      if (!isTaken && !isUnavailable) {
        el.onclick = () => onSlotClick({ day: currentDayOffset, slot: { start, end }, room, key, isMine });
      }

      row.appendChild(el);
    });

    grid.appendChild(row);
  });

  updateRoomStatus();
}

function updateRoomStatus() {
  ROOMS.forEach(room => {
    const el = document.getElementById(`status${room}`);
    if (roomUnavailable[String(currentDayOffset)] === room) {
      el.textContent = '使用不可';
      el.className = 'room-label-status status-unavailable';
      el.style.background = '';
      el.style.color = '';
      return;
    }
    el.className = 'room-label-status status-open';
    const taken = VALID_SLOTS.filter(({ start }) => {
      const b = bookings[`${currentDayOffset}_${start}_${room}`];
      return b && !b.blocked;
    }).length;
    if (taken === VALID_SLOTS.length) {
      el.textContent = '満室';
      el.style.background = 'rgba(232,197,184,0.3)';
      el.style.color = 'var(--brown)';
    } else {
      el.textContent = `空き ${VALID_SLOTS.length - taken}枠`;
      el.style.background = 'rgba(138,171,138,0.15)';
      el.style.color = 'var(--sage-dark)';
    }
  });
}

// ==============================
// SLOT CLICK
// ==============================
function onSlotClick({ day, slot, room, key, isMine }) {
  if (isMine) {
    // Show cancel confirmation
    cancelKey = key;
    document.getElementById('cancelDetail').innerHTML = buildDetailHTML({
      '日付': fmtDate(getDateObj(day)),
      '時間': `${slot.start}〜${slot.end}（45分）`,
      'シャワー室': `シャワー室 ${room}`,
    });
    document.getElementById('cancelOverlay').classList.add('show');
    return;
  }

  // Select this slot
  selected = { day, slot, room, key };
  document.getElementById('panelDetail').textContent = `${slot.start}〜${slot.end}　シャワー室 ${room}`;
  document.getElementById('panelSub').textContent    = `${fmtDate(getDateObj(day))}　45分間`;

  const btn = document.getElementById('btnBook');
  if (!patientName) {
    btn.disabled = true;
    btn.textContent = '先に患者情報を設定してください';
  } else {
    btn.disabled = false;
    btn.textContent = 'この時間を予約する';
  }

  document.getElementById('bookingPanel').classList.add('show');
  renderGrid();
}

function clearSelection() {
  selected = null;
  document.getElementById('bookingPanel').classList.remove('show');
  renderGrid();
}

// ==============================
// CONFIRM BOOKING MODAL
// ==============================
function openConfirmModal() {
  if (!selected || !patientName) return;
  const { slot, room, day } = selected;
  document.getElementById('confirmDetail').innerHTML = buildDetailHTML({
    '日付':       fmtDate(getDateObj(day)),
    '時間':       `${slot.start}〜${slot.end}（45分）`,
    'シャワー室': `シャワー室 ${room}`,
    'お名前':     patientName,
    '患者ID':     patientId || '—',
  });
  document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirmModal() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

function doBook() {
  if (!selected) return;
  bookings[selected.key] = { patientName, patientId, mine: true };
  persist();
  closeConfirmModal();
  clearSelection();
  renderAll();
  showToast('✓ 予約が完了しました！');
}

// ==============================
// CANCEL MODAL
// ==============================
function closeCancelModal() {
  document.getElementById('cancelOverlay').classList.remove('show');
  cancelKey = null;
}

function doCancel() {
  if (!cancelKey) return;
  delete bookings[cancelKey];
  persist();
  closeCancelModal();
  renderAll();
  showToast('予約をキャンセルしました');
}

function openCancelFromList(key) {
  const parts   = key.split('_');
  const dayOff  = parseInt(parts[0]);
  const start   = parts[1];
  const room    = parts[2];
  const slotObj = VALID_SLOTS.find(s => s.start === start) || { end: '—' };
  cancelKey = key;
  document.getElementById('cancelDetail').innerHTML = buildDetailHTML({
    '日付':       fmtDate(getDateObj(dayOff)),
    '時間':       `${start}〜${slotObj.end}（45分）`,
    'シャワー室': `シャワー室 ${room}`,
  });
  document.getElementById('cancelOverlay').classList.add('show');
}

// ==============================
// MY BOOKINGS LIST
// ==============================
function renderMyBookings() {
  const list = document.getElementById('myBookingsList');
  const mine = Object.entries(bookings)
    .filter(([, v]) => isMyBooking(v))
    .map(([k]) => {
      const [dayStr, start, room] = k.split('_');
      const s = VALID_SLOTS.find(x => x.start === start) || { end: '—' };
      return { dayOff: parseInt(dayStr), start, end: s.end, room, key: k };
    })
    .sort((a, b) => a.dayOff - b.dayOff || a.start.localeCompare(b.start));

  if (!mine.length) {
    list.innerHTML = '<div class="booking-empty">現在、予約はありません</div>';
    return;
  }

  list.innerHTML = mine.map(b => `
    <div class="booking-item">
      <div class="booking-color"></div>
      <div class="booking-info">
        <div class="booking-time">${b.start}〜${b.end}　シャワー室 ${b.room}</div>
        <div class="booking-meta">${fmtDate(getDateObj(b.dayOff))}　45分間</div>
      </div>
      <button class="btn-cancel-booking" onclick="openCancelFromList('${b.key}')">キャンセル</button>
    </div>
  `).join('');
}

// ==============================
// HELPERS
// ==============================
function buildDetailHTML(obj) {
  return Object.entries(obj).map(([k, v]) => `
    <div class="modal-detail-row">
      <span class="modal-detail-key">${k}</span>
      <span class="modal-detail-val">${v}</span>
    </div>`).join('');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function renderAll() {
  renderDateNav();
  renderGrid();
  renderMyBookings();
}

// ==============================
// EVENTS
// ==============================
// Overlay click to close
['confirmOverlay','cancelOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) {
      id === 'confirmOverlay' ? closeConfirmModal() : closeCancelModal();
    }
  });
});

// Enter key in setup form
document.getElementById('inputName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputId').focus();
  document.getElementById('inputName').classList.remove('error');
});
document.getElementById('inputId').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePatient();
});

// ==============================
// START
// ==============================
init();
</script>
</body>
</html>
